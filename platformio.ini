; PlatformIO Project Configuration
; Target: Seeed reTerminal E1002 (ESP32-S3)
; Framework: Arduino
; Display: Spectra 6 ePaper via Seeed reTerminal E10xx driver

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; Seeed reTerminal E10xx ePaper driver (Spectra 6 / GDEY0426Z98)
lib_deps =
    https://github.com/Seeed-Studio/Seeed_Arduino_ReTerminal_E10xx.git

monitor_speed = 115200
upload_speed = 921600

build_flags =
    ; Suppress verbose ESP-IDF log output in production
    -DCORE_DEBUG_LEVEL=0
    ; Enable PSRAM if available on the specific module
    -DBOARD_HAS_PSRAM
    ; Grid and display geometry — adjust to match actual display resolution
    -DGRID_W=120
    -DGRID_H=120
    -DDISP_W=648
    -DDISP_H=480

board_build.arduino.memory_type = qio_opi
board_build.partitions = default_8MB.csv
