; PlatformIO Project Configuration
; Target: Seeed reTerminal E1002 (ESP32-S3)
; Framework: Arduino
; Display: Spectra 6 ePaper via Seeed reTerminal E10xx driver

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; Seeed reTerminal E10xx ePaper driver (Spectra 6 / ~800x480 panel)
lib_deps =
    https://github.com/Seeed-Studio/Seeed_GFX.git

monitor_speed = 115200
upload_speed = 460800

build_flags =
    ; Suppress verbose ESP-IDF log output in production
    -DCORE_DEBUG_LEVEL=0
    ; Enable PSRAM if available on the specific module
    -DBOARD_HAS_PSRAM
    ; Display geometry
    -DDISP_W=800
    -DDISP_H=480
    ; Simulation selection: SIM_GOL or leave unset for sandpile
    -DSIM_GOL
    -DGOL_W=200
    -DGOL_H=120
    ; Sandpile grid (used when SIM_GOL is not defined)
    ; -DGRID_W=120
    ; -DGRID_H=72
    ; Enable Seeed_GFX ePaper support — BOARD_SCREEN_COMBO auto-configures
    ; pins, driver (ED2208), and SPI for the reTerminal E1002
    -DEPAPER_ENABLE
    -DBOARD_SCREEN_COMBO=521

board_build.arduino.memory_type = qio_opi
board_build.partitions = default_8MB.csv
